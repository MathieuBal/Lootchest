<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Lootchest — Démo des effets du village</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root{ --gold:#f0c463; --ink:#ece4f5; --ink2:#9a8fb8; --panel:#171028; --bd:#3a2c52; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:#07050c;font-family:Inter,system-ui;color:var(--ink);overflow:hidden;}
  #scene{position:fixed;inset:0;overflow:hidden;}
  #world{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);}
  #world img.lyr{position:absolute;inset:0;width:100%;height:100%;display:block;user-select:none;-webkit-user-drag:none;}
  #fxcanvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}

  /* halos CSS */
  #ambient{position:absolute;inset:0;pointer-events:none;}
  .glow{position:absolute;width:1.6%;aspect-ratio:4/3;border-radius:50%;
    background:rgba(255,170,60,.30);box-shadow:0 0 14px 6px rgba(255,140,40,.45);
    animation:glowPulse 2.6s infinite ease-in-out;animation-delay:var(--d,0s);}
  @keyframes glowPulse{0%,100%{opacity:.4;transform:scale(.95);}50%{opacity:.85;transform:scale(1.08);}}
  .glow.magic{background:rgba(170,80,255,.32);box-shadow:0 0 16px 7px rgba(170,80,255,.55);animation:magicPulse 1.9s infinite ease-in-out;}
  @keyframes magicPulse{0%,100%{opacity:.4;transform:scale(.9) rotate(0deg);}50%{opacity:.95;transform:scale(1.12) rotate(3deg);}}
  .glow.holy{background:rgba(190,225,255,.30);box-shadow:0 0 18px 8px rgba(160,210,255,.5);animation:glowPulse 3.4s infinite ease-in-out;}
  .glow.fire{background:rgba(255,120,40,.38);box-shadow:0 0 18px 8px rgba(255,90,20,.6);animation:firePulse 1.1s infinite ease-in-out;}
  @keyframes firePulse{0%,100%{opacity:.5;transform:scale(.92);}35%{opacity:.95;transform:scale(1.1);}60%{opacity:.7;transform:scale(1.0);}}
  body.no-glows #ambient{display:none;}

  /* cycle jour/nuit : teinte (multiply sur le fond) + vignette, sous les particules */
  #tint{position:absolute;inset:0;pointer-events:none;mix-blend-mode:multiply;
    background:#0a0e2a;opacity:0;}
  #vig{position:absolute;inset:0;pointer-events:none;opacity:0;
    background:radial-gradient(132% 130% at 50% 42%, transparent 50%, rgba(4,3,16,.92) 100%);}

  /* panneau de contrôle */
  #panel{position:fixed;top:12px;left:12px;z-index:50;width:228px;
    background:rgba(23,16,40,.94);border:1px solid var(--bd);border-radius:14px;
    padding:14px;backdrop-filter:blur(6px);box-shadow:0 10px 30px rgba(0,0,0,.5);}
  #panel h1{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
  .row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px;}
  .row label{flex:1;cursor:pointer;}
  .row input[type=checkbox]{width:16px;height:16px;accent-color:#d4a13a;cursor:pointer;}
  .srow{margin:10px 0 8px;}
  .srow .lab{display:flex;justify-content:space-between;font-size:11.5px;color:var(--ink2);margin-bottom:4px;}
  .srow .lab b{color:var(--ink);font-family:"JetBrains Mono",monospace;font-weight:600;}
  .srow input[type=range]{width:100%;accent-color:#d4a13a;}
  #birdsBtn{width:100%;margin-top:6px;height:36px;border-radius:9px;border:1px solid var(--bd);
    background:#241b3c;color:var(--ink);font-family:Inter;font-size:12.5px;font-weight:600;cursor:pointer;}
  #birdsBtn:hover{background:#2e2348;}
  #hint{margin-top:10px;font-size:10.5px;line-height:1.5;color:var(--ink2);}
  #fold{position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:6px;border:1px solid var(--bd);
    background:#241b3c;color:var(--ink2);font-size:12px;cursor:pointer;line-height:1;}
  body.folded #panel > :not(#fold):not(h1){display:none;}

  /* ── mobile : panneau en tiroir bas + scène déplaçable ── */
  @media (max-width:700px){
    #panel{top:auto;left:8px;right:8px;bottom:8px;width:auto;
      padding:12px 14px calc(env(safe-area-inset-bottom,0px) + 12px);
      max-height:46vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
    #panel h1{margin-bottom:8px;}
    .row{min-height:30px;font-size:14px;}
    .row input[type=checkbox]{width:20px;height:20px;}
    #birdsBtn{height:44px;}
    #fold{width:34px;height:34px;font-size:16px;}
    #scene{cursor:grab;}
  }
</style>
</head>
<body>
<div id="scene">
  <div id="world">
    <img class="lyr" src="assets/village/village_bg.png" alt="">
    <div id="tint"></div>
    <div id="vig"></div>
    <div id="ambient"></div>
    <canvas id="fxcanvas"></canvas>
  </div>
</div>

<div id="panel">
  <button id="fold">−</button>
  <h1>Effets du village</h1>
  <div class="row"><input type="checkbox" id="ck-smoke" checked><label for="ck-smoke">Fumées de cheminée</label></div>
  <div class="row"><input type="checkbox" id="ck-embers" checked><label for="ck-embers">Braises forge + fonderie</label></div>
  <div class="row"><input type="checkbox" id="ck-flies" checked><label for="ck-flies">Lucioles</label></div>
  <div class="row"><input type="checkbox" id="ck-pond" checked><label for="ck-pond">Étang qui scintille</label></div>
  <div class="row"><input type="checkbox" id="ck-birds" checked><label for="ck-birds">Oiseaux</label></div>
  <div class="row"><input type="checkbox" id="ck-torches" checked><label for="ck-torches">Torches vacillantes</label></div>
  <div class="row"><input type="checkbox" id="ck-magic" checked><label for="ck-magic">Magie (statue, sanctuaire, orbe)</label></div>
  <div class="row"><input type="checkbox" id="ck-leaves" checked><label for="ck-leaves">Feuilles des lisières</label></div>
  <div class="row"><input type="checkbox" id="ck-mist" checked><label for="ck-mist">Brume rasante</label></div>
  <div class="row"><input type="checkbox" id="ck-bats" checked><label for="ck-bats">Chauves-souris</label></div>
  <div class="row"><input type="checkbox" id="ck-stars" checked><label for="ck-stars">Ciel étoilé</label></div>
  <div class="row"><input type="checkbox" id="ck-folk" checked><label for="ck-folk">Villageois sur les routes</label></div>
  <div class="row"><input type="checkbox" id="ck-moths" checked><label for="ck-moths">Papillons de nuit (torches)</label></div>
  <div class="row"><input type="checkbox" id="ck-glows" checked><label for="ck-glows">Halos de fenêtres (CSS)</label></div>
  <div class="srow"><div class="lab"><span>Densité</span><b id="v-dens">×1.0</b></div>
    <input type="range" id="sl-dens" min="0.3" max="3" step="0.1" value="1"></div>
  <div class="srow"><div class="lab"><span>Vent</span><b id="v-wind">×1.0</b></div>
    <input type="range" id="sl-wind" min="0" max="3" step="0.1" value="1"></div>
  <div class="srow"><div class="lab"><span>Heure ☀︎ ↔ ☾</span><b id="v-tod">crépuscule</b></div>
    <input type="range" id="sl-tod" min="0" max="1" step="0.01" value="0.35"></div>
  <div class="row"><input type="checkbox" id="ck-auto"><label for="ck-auto">Cycle jour/nuit auto</label></div>
  <button id="birdsBtn">🕊 Déclencher un vol d'oiseaux</button>
  <div id="hint">Page de démo : les effets sont forcés même si ton système est en « animations réduites ». Dans le jeu, ils respecteront ce réglage et l'option Particules réduites.</div>
</div>

<script>
(function(){
  const world=document.getElementById('world');
  const RATIO=1672/941;
  let nightness=0.35, autoTod=false;   // 0 = soir, 1 = nuit profonde
  function fit(){
    const vw=innerWidth, vh=innerHeight;
    let w,h;
    if(vw/vh>RATIO){ w=vw; h=vw/RATIO; } else { h=vh; w=vh*RATIO; }
    if(vw<700){ w*=1.55; h*=1.55; }   // sur-zoom mobile pour voir les détails
    world.style.width=w+'px'; world.style.height=h+'px';
    clampPan();
    sizeCanvas();
  }

  // pan au doigt / à la souris (utile quand la scène déborde)
  let ox=0, oy=0, dragging=false, sx=0, sy=0;
  function clampPan(){
    const mw=Math.max(0,(world.offsetWidth-innerWidth)/2);
    const mh=Math.max(0,(world.offsetHeight-innerHeight)/2);
    ox=Math.max(-mw,Math.min(mw,ox)); oy=Math.max(-mh,Math.min(mh,oy));
    world.style.transform=`translate(calc(-50% + ${ox}px), calc(-50% + ${oy}px))`;
  }
  const scene=document.getElementById('scene');
  scene.addEventListener('pointerdown',e=>{if(e.target.closest('#panel'))return;dragging=true;sx=e.clientX-ox;sy=e.clientY-oy;});
  addEventListener('pointermove',e=>{if(!dragging)return;ox=e.clientX-sx;oy=e.clientY-sy;clampPan();});
  addEventListener('pointerup',()=>dragging=false);

  // halos CSS
  const AMBIENT=[
    {cls:'glow', x:47.5, y:46.5, d:0},   // fenêtres mairie (sous l'horloge)
    {cls:'glow', x:69.5, y:48.5, d:.9},  // étals du marché
    {cls:'glow', x:68.5, y:64, d:1.7},   // fenêtres guilde
    {cls:'glow', x:21.5, y:25, d:2.4},   // fenêtre maison gauche
    {cls:'glow magic', x:37.3, y:78, d:0},  // dôme de l'atelier d'orbes
    {cls:'glow holy', x:68.7, y:5.5, d:0},  // cristal du sanctuaire
    {cls:'glow fire', x:77.9, y:83, d:0}, // gueule du four de la forge
  ];
  const amb=document.getElementById('ambient');
  AMBIENT.forEach(a=>{const el=document.createElement('div');el.className=a.cls;
    el.style.left=a.x+'%';el.style.top=a.y+'%';el.style.setProperty('--d',a.d+'s');amb.appendChild(el);});

  // config pilotée par le panneau
  const CFG={smoke:true,embers:true,flies:true,pond:true,birds:true,torches:true,magic:true,leaves:true,mist:true,bats:true,stars:true,folk:true,moths:true,dens:1,wind:1};
  const bind=(id,key)=>{document.getElementById(id).addEventListener('change',e=>CFG[key]=e.target.checked);};
  bind('ck-smoke','smoke');bind('ck-embers','embers');bind('ck-flies','flies');
  bind('ck-pond','pond');bind('ck-birds','birds');
  bind('ck-torches','torches');bind('ck-magic','magic');bind('ck-leaves','leaves');
  bind('ck-mist','mist');bind('ck-bats','bats');bind('ck-stars','stars');
  bind('ck-folk','folk');bind('ck-moths','moths');
  // sur mobile, démarrer panneau replié pour voir la scène
  if(innerWidth<700){document.body.classList.add('folded');document.getElementById('fold').textContent='+';}
  document.getElementById('ck-glows').addEventListener('change',e=>document.body.classList.toggle('no-glows',!e.target.checked));
  document.getElementById('sl-dens').addEventListener('input',e=>{CFG.dens=+e.target.value;document.getElementById('v-dens').textContent='×'+CFG.dens.toFixed(1);});
  document.getElementById('sl-wind').addEventListener('input',e=>{CFG.wind=+e.target.value;document.getElementById('v-wind').textContent='×'+CFG.wind.toFixed(1);});
  const slTod=document.getElementById('sl-tod');
  slTod.addEventListener('input',e=>{nightness=+e.target.value;autoTod=false;document.getElementById('ck-auto').checked=false;applyTod();});
  document.getElementById('ck-auto').addEventListener('change',e=>autoTod=e.target.checked);
  document.getElementById('fold').addEventListener('click',()=>{
    const f=document.body.classList.toggle('folded');
    document.getElementById('fold').textContent=f?'+':'−';
  });

  // ── moteur canvas (identique à la carte, + forçage et config) ──
  const cvs=document.getElementById('fxcanvas'), g=cvs.getContext('2d');
  const tintEl=document.getElementById('tint'), vigEl=document.getElementById('vig'), todLbl=document.getElementById('v-tod');
  // teinte jour/nuit appliquée directement (indépendante du RAF → réponse instantanée)
  function applyTod(){
    tintEl.style.opacity=(nightness*0.62).toFixed(3);
    vigEl.style.opacity=(nightness*0.8).toFixed(3);
    amb.style.opacity=(0.35+nightness*0.65).toFixed(3);
    todLbl.textContent = nightness<0.22?'soir' : nightness<0.62?'crépuscule' : 'nuit profonde';
  }
  applyTod();
  function sizeCanvas(){
    const dpr=Math.min(devicePixelRatio||1,1.5);
    cvs.width=Math.round(world.offsetWidth*dpr);
    cvs.height=Math.round(world.offsetHeight*dpr);
  }
  addEventListener('resize',fit); fit();

  function dot(color){const c=document.createElement('canvas');c.width=c.height=64;
    const t=c.getContext('2d');const r=t.createRadialGradient(32,32,0,32,32,32);
    r.addColorStop(0,color);r.addColorStop(1,'rgba(0,0,0,0)');t.fillStyle=r;t.fillRect(0,0,64,64);return c;}
  const smokeDot=dot('rgba(196,190,206,0.55)');
  const emberDot=dot('rgba(255,168,60,1)');
  const flyDot=dot('rgba(255,238,150,1)');
  const sparkDot=dot('rgba(215,238,255,1)');
  const goldDot=dot('rgba(255,215,120,1)');
  const violetDot=dot('rgba(190,120,255,1)');
  const mistDot=dot('rgba(170,165,190,0.4)');
  const starDot=dot('rgba(235,242,255,1)');

  const SMOKE=[[23.2,14.0],[20.8,15.5],[12.6,62.0],[84.6,71.0],[58.0,12.0],[13.8,64.0]];
  const EMBERS=[[77.9,82.5],[13.3,70.5]];
  const POND=[9,20,88,96];
  // positions calées sur l'illustration :
  const TORCHES=[[44.2,56.8],[55.8,68.0],[44.2,74.0],[65.3,70.5],[9.3,39.0],[31.2,75.8]];   // lampadaires
  const STATUE=[51.8,61.0];                                  // statue de la place
  const MAGIC=[[67.5,3.5,70.5,10],[36,75.5,38.5,79]];        // sanctuaire, orbe (x1,y1,x2,y2)
  const LEAFZONES=[[2,30,10,26],[55,75,8,16]];               // lisières (x1,x2,y1,y2)
  const MISTZONES=[[4,26,33,47],[2,98,91,98]];               // carrière, bas de l'image
  const SKY=[58,96,1.5,6.0];                                  // bande de ciel haut-droite
  const stars=Array.from({length:11},(_,i)=>({
    x:SKY[0]+Math.random()*(SKY[1]-SKY[0]), y:SKY[2]+Math.random()*(SKY[3]-SKY[2]),
    sp:.4+Math.random()*1.1, ph:Math.random()*7, s:.07+Math.random()*.06}));
  let shooting=null, nextShoot=20+Math.random()*40;
  let bats=[], nextBats=12+Math.random()*20;
  // routes des villageois : polylignes en % suivant les chemins de terre
  const ROADS=[
    [[50,66],[47,72],[44,76.5],[42,80]],                  // place → atelier d'orbes (entrée bas-droite)
    [[51,65],[49.5,71],[48.5,77],[48,83]],                // place → serrurerie (chemin à gauche du bâtiment)
    [[55,58],[60,53.5],[64.5,50],[68,47.5]],              // place → marché (route haut-droite)
    [[46,58],[40,52.5],[33,48.5],[26,45],[18.5,43]],      // place → carrière (au-dessus de la trésorerie)
    [[56,67],[61,71],[65.5,73.5],[68,74.5]],              // place → guilde (escaliers en bas)
    [[55,70],[59,75],[64,80],[70,84]],                    // place → forge (route basse)
  ];
  let folk=[], nextFolk=2;
  let moths=[];
  TORCHES.forEach((tc,i)=>{for(let m=0;m<2;m++)moths.push({tx:tc[0],ty:tc[1],
    a:Math.random()*6.28, r:.5+Math.random()*.7, sp:1.2+Math.random()*1.6, ph:Math.random()*7});});
  const P=[]; const acc=new Map();

  const flies=Array.from({length:14},(_,i)=>({
    cx:[8,16,30,55,77,88,12,40][i%8]+Math.random()*6,
    cy:[90,60,90,92,90,70,80,88][i%8]+Math.random()*4-2,
    rx:1.2+Math.random()*1.8, ry:.8+Math.random()*1.2,
    sp:.25+Math.random()*.4, p1:Math.random()*7, p2:Math.random()*7, bl:.5+Math.random()*1.2,
  }));
  let birds=null, nextBirds=4;
  document.getElementById('birdsBtn').addEventListener('click',()=>{birds=null;nextBirds=0;});

  let last=performance.now();
  function frame(now){
    requestAnimationFrame(frame);
    const dt=Math.min(.05,(now-last)/1000); last=now;
    const W=cvs.width,H=cvs.height,t=now/1000;
    const X=x=>x/100*W, Y=y=>y/100*H, S=s=>s/100*W;
    const wind=-(.35+Math.sin(t*.13)*.25)*CFG.wind;

    // cycle jour/nuit
    if(autoTod){ nightness=.5-.5*Math.cos(t*.06); slTod.value=nightness.toFixed(2); applyTod(); }

    function emit(key,rate,fn){let a=(acc.get(key)||0)+dt*rate;while(a>=1){a-=1;fn();}acc.set(key,a);}

    if(CFG.smoke) SMOKE.forEach((e,i)=>emit('s'+i,1.9*CFG.dens,()=>{P.push({k:'smoke',x:e[0]+(Math.random()-.5)*.5,y:e[1],
      vx:wind*.6+(Math.random()-.5)*.3, vy:-(1.3+Math.random()*1.1),
      life:3.2+Math.random()*1.8, age:0, s:.5+Math.random()*.25, ph:Math.random()*7});}));
    if(CFG.embers) EMBERS.forEach((e,i)=>emit('e'+i,5*CFG.dens,()=>{P.push({k:'ember',x:e[0]+(Math.random()-.5)*.8,y:e[1],
      vx:(Math.random()-.5)*1.2, vy:-(2.5+Math.random()*3),
      life:.7+Math.random()*.9, age:0, s:.12+Math.random()*.14, ph:Math.random()*7});}));
    if(CFG.pond) emit('pond',1.4*CFG.dens,()=>{P.push({k:'spark',x:POND[0]+Math.random()*(POND[1]-POND[0]),
      y:POND[2]+Math.random()*(POND[3]-POND[2]), vx:0,vy:0, life:.9, age:0, s:.16+Math.random()*.1, ph:0});});
    if(CFG.magic){
      emit('statue',.9*CFG.dens,()=>{const ang=Math.random()*6.28;P.push({k:'gold',
        x:STATUE[0]+Math.cos(ang)*1.3, y:STATUE[1]+Math.sin(ang)*.9,
        vx:(Math.random()-.5)*.2, vy:-(.35+Math.random()*.45),
        life:2.6+Math.random()*1.6, age:0, s:.09+Math.random()*.07, ph:Math.random()*7});});
      MAGIC.forEach((z,i)=>emit('mg'+i,1.1*CFG.dens,()=>{P.push({k:'violet',
        x:z[0]+Math.random()*(z[2]-z[0]), y:z[1]+Math.random()*(z[3]-z[1]),
        vx:(Math.random()-.5)*.25, vy:-(.5+Math.random()*.6),
        life:2+Math.random()*1.4, age:0, s:.08+Math.random()*.07, ph:Math.random()*7});}));
    }
    if(CFG.leaves) LEAFZONES.forEach((z,i)=>emit('lf'+i,.7*CFG.dens,()=>{P.push({k:'leaf',
      x:z[0]+Math.random()*(z[1]-z[0]), y:z[2]+Math.random()*(z[3]-z[2]),
      vx:wind*.8, vy:.8+Math.random()*.7,
      life:4+Math.random()*3, age:0, s:.09+Math.random()*.06, ph:Math.random()*7});}));
    if(CFG.mist) MISTZONES.forEach((z,i)=>emit('ms'+i,.22*CFG.dens,()=>{P.push({k:'mist',
      x:z[0]+Math.random()*(z[1]-z[0]), y:z[2]+Math.random()*(z[3]-z[2]),
      vx:wind*.4+(Math.random()-.5)*.15, vy:-(Math.random()*.06),
      life:9+Math.random()*6, age:0, s:2.6+Math.random()*2.2, ph:Math.random()*7});}));

    // chauves-souris depuis la tour de la caserne
    if(CFG.bats){
      nextBats-=dt;
      if(nextBats<=0){
        const n=2+(Math.random()*2|0);
        for(let b=0;b<n;b++) bats.push({x:89.5,y:22,vx:-(1+Math.random()*2),vy:-(.5+Math.random()),
          life:5+Math.random()*3, age:0, ph:Math.random()*7, turn:0});
        nextBats=26+Math.random()*30;
      }
    }

    // villageois : spawn sur une route au hasard
    if(CFG.folk){
      nextFolk-=dt;
      if(nextFolk<=0&&folk.length<5){
        const road=ROADS[Math.random()*ROADS.length|0];
        const rev=Math.random()<.5;
        folk.push({road, rev, seg:0, prog:0, sp:.55+Math.random()*.35,
          lantern:Math.random()<.45,
          tint:Math.random()<.3?'rgba(110,80,52,1)':'rgba(38,30,52,1)', ph:Math.random()*7});
        nextFolk=5+Math.random()*7;
      }
    }

    if(CFG.birds){
      nextBirds-=dt;
      if(!birds&&nextBirds<=0){
        const ltr=Math.random()<.5;
        birds={x:ltr?-6:106, dir:ltr?1:-1, y:5+Math.random()*8, n:3+(Math.random()*3|0), ph:Math.random()*7};
        nextBirds=22+Math.random()*26;
      }
    }

    g.clearRect(0,0,W,H);

    for(let i=P.length-1;i>=0;i--){
      const p=P[i]; p.age+=dt;
      if(p.age>=p.life){P.splice(i,1);continue;}
      const f=p.age/p.life;
      p.x+=p.vx*dt; p.y+=p.vy*dt;
      if(p.k==='smoke'){
        p.x+=Math.sin(t*.8+p.ph)*.12*dt*8;
        const a=.34*Math.min(f*4,1)*(1-f);
        const s=S(p.s*(1+f*2.2));
        g.globalAlpha=a; g.drawImage(smokeDot,X(p.x)-s,Y(p.y)-s,s*2,s*2);
      } else if(p.k==='ember'){
        p.vx+=wind*dt; p.vy+=1.2*dt;
        const a=(1-f)*(.55+.45*Math.sin(p.age*28+p.ph));
        const s=S(p.s);
        g.globalCompositeOperation='lighter';
        g.globalAlpha=Math.max(0,a); g.drawImage(emberDot,X(p.x)-s,Y(p.y)-s,s*2,s*2);
        g.globalCompositeOperation='source-over';
      } else if(p.k==='gold'||p.k==='violet'){
        p.x+=Math.sin(t*1.4+p.ph)*.06*dt*8;
        const a=.7*Math.sin(f*Math.PI);
        const s=S(p.s);
        g.globalCompositeOperation='lighter';
        g.globalAlpha=a; g.drawImage(p.k==='gold'?goldDot:violetDot,X(p.x)-s,Y(p.y)-s,s*2,s*2);
        g.globalCompositeOperation='source-over';
      } else if(p.k==='leaf'){
        p.x+=Math.sin(t*2.2+p.ph)*.25*dt*8;
        const a=.55*Math.min(f*5,1)*(1-Math.max(0,(f-.75)*4));
        const s=S(p.s);
        g.globalAlpha=Math.max(0,a); g.fillStyle='rgba(96,86,58,1)';
        g.save();g.translate(X(p.x),Y(p.y));g.rotate(Math.sin(t*3+p.ph)*.9);
        g.fillRect(-s,-s*.4,s*2,s*.8);g.restore();
      } else if(p.k==='mist'){
        const a=.07*Math.sin(f*Math.PI);
        const s=S(p.s);
        g.globalAlpha=a; g.drawImage(mistDot,X(p.x)-s,Y(p.y)-s*.5,s*2,s);
      } else {
        const a=.5*Math.sin(f*Math.PI);
        const s=S(p.s);
        g.globalCompositeOperation='lighter';
        g.globalAlpha=a; g.drawImage(sparkDot,X(p.x)-s,Y(p.y)-s,s*2,s*2);
        g.globalCompositeOperation='source-over';
      }
    }

    if(CFG.flies){
      g.globalCompositeOperation='lighter';
      flies.forEach(fl=>{
        const x=fl.cx+Math.sin(t*fl.sp+fl.p1)*fl.rx;
        const y=fl.cy+Math.sin(t*fl.sp*1.37+fl.p2)*fl.ry;
        const a=Math.pow(Math.max(0,Math.sin(t*fl.bl+fl.p1)),3)*.85;
        if(a<.02)return;
        const s=S(.14);
        g.globalAlpha=a; g.drawImage(flyDot,X(x)-s,Y(y)-s,s*2,s*2);
      });
      g.globalCompositeOperation='source-over';
    }

    // torches vacillantes
    if(CFG.torches){
      g.globalCompositeOperation='lighter';
      TORCHES.forEach((tc,i)=>{
        const fl=.45+.3*Math.sin(t*11+i*2.3)+.25*Math.sin(t*23+i*5.1);
        const s=S(.26)*(0.9+.2*Math.sin(t*9+i));
        g.globalAlpha=Math.max(.12,fl*.5*(.55+nightness*.45));
        g.drawImage(emberDot,X(tc[0])-s,Y(tc[1])-s,s*2,s*2);
      });
      g.globalCompositeOperation='source-over';
    }

    // étoiles + étoile filante (bande de ciel haut-droite)
    if(CFG.stars){
      g.globalCompositeOperation='lighter';
      stars.forEach(st=>{
        const a=(.15+.45*Math.pow(Math.sin(t*st.sp+st.ph),2))*nightness;
        const s=S(st.s);
        g.globalAlpha=a; g.drawImage(starDot,X(st.x)-s,Y(st.y)-s,s*2,s*2);
      });
      nextShoot-=dt;
      if(!shooting&&nextShoot<=0){
        shooting={x:SKY[0]+Math.random()*(SKY[1]-SKY[0]-10), y:SKY[2]+Math.random()*1.5, age:0, life:.8};
        nextShoot=35+Math.random()*45;
      }
      if(shooting){
        shooting.age+=dt;
        if(shooting.age>=shooting.life) shooting=null;
        else{
          const f2=shooting.age/shooting.life;
          const sx=X(shooting.x+f2*7), sy=Y(shooting.y+f2*2.2);
          const tail=S(1.4)*(1-f2);
          const grd=g.createLinearGradient(sx-tail,sy-tail*.3,sx,sy);
          grd.addColorStop(0,'rgba(235,242,255,0)');grd.addColorStop(1,'rgba(235,242,255,.8)');
          g.strokeStyle=grd;g.lineWidth=Math.max(1,S(.05));
          g.globalAlpha=.8*(1-f2*.4);
          g.beginPath();g.moveTo(sx-tail,sy-tail*.3);g.lineTo(sx,sy);g.stroke();
        }
      }
      g.globalCompositeOperation='source-over';
    }

    // chauves-souris (vol erratique)
    for(let i=bats.length-1;i>=0;i--){
      const b=bats[i]; b.age+=dt;
      if(b.age>=b.life||b.x<-5||b.y<-3){bats.splice(i,1);continue;}
      b.turn-=dt;
      if(b.turn<=0){b.vx+=(Math.random()-.5)*1.6;b.vy+=(Math.random()-.5)*1.4;
        b.vx=Math.max(-3,Math.min(1,b.vx));b.vy=Math.max(-2,Math.min(1.2,b.vy));b.turn=.25+Math.random()*.3;}
      b.x+=b.vx*dt; b.y+=b.vy*dt;
      const a=Math.min(b.age*3,1)*(1-Math.max(0,(b.age/b.life-.7)/.3));
      const bx=X(b.x),by=Y(b.y),w=S(.28),flap=Math.sin(t*16+b.ph);
      g.strokeStyle='rgba(15,10,24,.85)';g.lineWidth=Math.max(1,S(.05));
      g.globalAlpha=Math.max(0,a*.85);
      g.beginPath();
      g.moveTo(bx-w,by-flap*w*.7);
      g.quadraticCurveTo(bx-w*.3,by+w*.2,bx,by);
      g.quadraticCurveTo(bx+w*.3,by+w*.2,bx+w,by-flap*w*.7);
      g.stroke();
    }

    // villageois : petites silhouettes qui suivent les routes
    for(let i=folk.length-1;i>=0;i--){
      const v=folk[i];
      const pts=v.rev?[...v.road].reverse():v.road;
      v.prog+=v.sp*dt;
      const a2=pts[v.seg], b2=pts[v.seg+1];
      const segLen=Math.hypot(b2[0]-a2[0],(b2[1]-a2[1])*.56)||.001; // y compress\u00e9 (iso)
      let f3=v.prog/segLen;
      if(f3>=1){v.seg++;v.prog=0;
        if(v.seg>=pts.length-1){folk.splice(i,1);continue;}
        continue;}
      const px=a2[0]+(b2[0]-a2[0])*f3, py=a2[1]+(b2[1]-a2[1])*f3;
      const bob=Math.abs(Math.sin(t*7+v.ph))*.12;
      const hpx=X(px), hpy=Y(py-bob), hs=S(.26);
      // fondu aux extr\u00e9mit\u00e9s du trajet
      const total=(v.seg+f3)/(pts.length-1);
      const fade=Math.min(1,Math.min(total,1-total)*6);
      if(v.lantern){
        const ls=hs*1.6;
        g.globalCompositeOperation='lighter';
        g.globalAlpha=.5*fade*(.8+.2*Math.sin(t*6+v.ph));
        g.drawImage(emberDot,hpx+hs*.5-ls,hpy-ls,ls*2,ls*2);
        g.globalCompositeOperation='source-over';
      }
      g.globalAlpha=fade;
      g.fillStyle=v.tint;
      // corps (petite capsule) + t\u00eate
      g.beginPath();g.ellipse(hpx,hpy,hs*.4,hs*.62,0,0,7);g.fill();
      g.beginPath();g.arc(hpx,hpy-hs*.75,hs*.3,0,7);g.fill();
      // ombre au sol
      g.globalAlpha=.35*fade;g.fillStyle='rgba(0,0,0,1)';
      g.beginPath();g.ellipse(hpx,Y(py)+hs*.55,hs*.5,hs*.16,0,0,7);g.fill();
    }

    // papillons de nuit autour des torches
    if(CFG.moths){
      g.globalCompositeOperation='lighter';
      moths.forEach(m=>{
        m.a+=m.sp*dt*(1+.4*Math.sin(t*2+m.ph));
        const wob=Math.sin(t*5+m.ph)*.18;
        const x=m.tx+Math.cos(m.a)*(m.r+wob), y=m.ty+Math.sin(m.a*1.3)*(m.r*.55+wob)*.7;
        const a=.3+.3*Math.sin(t*9+m.ph);
        const s=S(.07+.025*Math.sin(t*13+m.ph));
        g.globalAlpha=Math.max(.1,a);
        g.drawImage(flyDot,X(x)-s,Y(y)-s,s*2,s*2);
      });
      g.globalCompositeOperation='source-over';
    }

    if(birds){
      birds.x+=birds.dir*2.6*dt;
      if(birds.x<-8||birds.x>108) birds=null;
      else{
        g.strokeStyle='rgba(12,8,20,.95)'; g.lineWidth=Math.max(1.4,S(.075));
        for(let b=0;b<birds.n;b++){
          const bx=X(birds.x-b*1.1*birds.dir), by=Y(birds.y+Math.sin(t*1.1+b)*0.6+(b%2)*.8);
          const w=S(.42+(b%3)*.05), flap=Math.sin(t*9+birds.ph+b)*.55;
          g.globalAlpha=.95;
          // petit corps pour ancrer la silhouette
          g.fillStyle='rgba(12,8,20,.95)';
          g.beginPath();g.ellipse(bx,by,w*.18,w*.10,0,0,7);g.fill();
          g.beginPath();
          g.moveTo(bx-w,by-flap*w);
          g.quadraticCurveTo(bx,by+w*.25,bx,by);
          g.quadraticCurveTo(bx,by+w*.25,bx+w,by-flap*w);
          g.stroke();
        }
      }
    }
    g.globalAlpha=1;
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
