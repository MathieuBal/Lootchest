<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Lootchest — Début de partie avec Mémo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --gold-100:#fbe9b0; --gold-200:#f0c463; --gold-300:#d4a13a;
    --ink-100:#faf2dd; --ink-400:#8c8470;
    --violet:#b39ddb; --panel:#171028; --panel-bd:#4a3a6e;
    --f-display:"Cinzel",serif; --f-body:"EB Garamond",Georgia,serif; --f-mono:"JetBrains Mono",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:#05030a;overflow:hidden;font-family:var(--f-body);
    -webkit-tap-highlight-color:transparent;user-select:none;}

  /* ════ Stage plein viewport (PC + mobile) ════ */
  #stage{position:fixed;inset:0;overflow:hidden;}
  #camera{position:absolute;inset:0;}
  .layer{position:absolute;inset:0;transform:scale(1.12);transform-origin:center center;will-change:transform;}
  .layer img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .layer svg{position:absolute;inset:0;width:100%;height:100%;display:block;}
  #camera.zoom{animation:camZoom 26s ease-in-out infinite alternate;}
  @keyframes camZoom{from{transform:scale(1)}to{transform:scale(1.07)}}
  #camera{transition:opacity .7s ease;}
  #stage.swap #camera{opacity:0;}

  /* vignette + scrim bas pour la lisibilité du dialogue */
  #shade{position:absolute;inset:0;pointer-events:none;z-index:5;background:
    radial-gradient(130% 110% at 50% 42%, transparent 58%, rgba(5,3,10,.5) 88%, rgba(5,3,10,.85) 100%);}
  #shade::after{content:"";position:absolute;left:0;right:0;bottom:0;height:46%;
    background:linear-gradient(180deg,transparent,rgba(6,4,12,.88) 82%);}

  /* ════ FX micro-boucles (reprises de la cinématique) ════ */
  @keyframes mote{0%{transform:translateY(0);opacity:0}10%{opacity:.9}90%{opacity:.7}100%{transform:translateY(-60px);opacity:0}}
  @keyframes drift{0%,100%{transform:translateX(0)}50%{transform:translateX(28px)}}
  @keyframes pulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fall{0%{transform:translateY(-40px);opacity:0}15%{opacity:.8}100%{transform:translateY(120px);opacity:0}}
  @keyframes flicker{0%,100%{opacity:.85}45%{opacity:.35}70%{opacity:.6}}
  @keyframes breathe{0%,100%{opacity:.78;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}
  @keyframes suck{0%{transform:translate(0,0);opacity:.9}100%{transform:translate(var(--sx,0),var(--sy,0));opacity:0}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-1.6%)}}
  @keyframes downslow{0%{transform:translateY(-3%)}100%{transform:translateY(3%)}}
  .fx-mote{animation:mote 5s linear infinite;animation-delay:var(--d,0s);}
  .fx-fall{animation:fall 6s linear infinite;animation-delay:var(--d,0s);}
  .fx-drift{animation:drift 14s ease-in-out infinite;}
  .fx-pulse{animation:pulse 4.5s ease-in-out infinite;transform-origin:center;}
  .fx-spin{animation:spin 60s linear infinite;transform-origin:50% 50%;}
  .fx-flicker{animation:flicker 3.5s ease-in-out infinite;}
  .fx-breathe{animation:breathe 6s ease-in-out infinite;transform-origin:center;}
  .fx-suck{animation:suck 3.4s ease-in infinite;animation-delay:var(--d,0s);}
  .fx-bob{animation:bob 8s ease-in-out infinite;}
  .fx-rain{animation:downslow 13s linear infinite alternate;}

  /* ════ Écran du coffre (phase 1) ════ */
  #chestScene{position:absolute;inset:0;z-index:8;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:26px;
    background:radial-gradient(90% 70% at 50% 60%, #140e22 0%, #05030a 75%);}
  #chestWrap{position:relative;cursor:pointer;}
  #chestWrap img{width:clamp(150px,38vmin,260px);image-rendering:pixelated;display:block;
    filter:drop-shadow(0 18px 32px rgba(0,0,0,.7));}
  #chestGlow{position:absolute;inset:-30%;border-radius:50%;pointer-events:none;
    background:radial-gradient(circle,rgba(240,196,99,.22),transparent 65%);
    animation:pulse 3.6s ease-in-out infinite;}
  #keyRow{display:flex;align-items:center;gap:10px;font-family:var(--f-mono);font-size:13px;
    letter-spacing:.22em;text-transform:uppercase;color:var(--gold-200);}
  #keyRow img{width:30px;image-rendering:pixelated;}
  #chestHint{font-size:clamp(17px,2.4vmin,21px);font-style:italic;color:var(--ink-400);animation:pulse 2.8s ease-in-out infinite;}
  #chestScene.shaking #chestWrap{animation:shake .65s ease;}
  @keyframes shake{0%,100%{transform:translateX(0) rotate(0)}20%{transform:translateX(-7px) rotate(-2deg)}40%{transform:translateX(7px) rotate(2deg)}60%{transform:translateX(-5px) rotate(-1.4deg)}80%{transform:translateX(5px) rotate(1deg)}}
  #burst{position:absolute;inset:0;z-index:9;pointer-events:none;opacity:0;
    background:radial-gradient(circle at 50% 58%, #fff6d8 0%, rgba(240,196,99,.85) 22%, rgba(179,157,219,.5) 45%, transparent 70%);}
  #burst.go{animation:burstAnim 1.1s ease-out forwards;}
  @keyframes burstAnim{0%{opacity:0;transform:scale(.3)}18%{opacity:1}100%{opacity:0;transform:scale(1.6)}}
  #chestScene,.fadable{transition:opacity .6s ease;}
  .hidden{opacity:0 !important;pointer-events:none !important;}

  /* ════ Mémo + dialogue (toutes phases) ════ */
  #dlg{position:absolute;left:0;right:0;bottom:0;z-index:20;
    display:flex;align-items:flex-end;gap:clamp(8px,1.6vw,16px);
    padding:0 max(14px, env(safe-area-inset-left)) calc(env(safe-area-inset-bottom,0px) + clamp(14px,3vmin,30px)) max(14px, env(safe-area-inset-left));
    max-width:860px;margin:0 auto;cursor:pointer;}
  #memoSprite{flex-shrink:0;width:clamp(96px,17vmin,160px);position:relative;margin-bottom:-6px;}
  #memoSprite img{width:100%;display:block;filter:drop-shadow(0 0 22px rgba(150,130,255,.5));
    animation:bob 4s ease-in-out infinite;}
  #box{flex:1;background:linear-gradient(160deg,rgba(28,21,48,.94),rgba(15,10,28,.96));
    border:1px solid var(--panel-bd);border-radius:16px 16px 16px 5px;
    padding:clamp(11px,1.8vmin,16px) clamp(13px,2vmin,20px);
    backdrop-filter:blur(6px);box-shadow:0 10px 34px rgba(0,0,0,.5);}
  #speaker{font-family:var(--f-mono);font-size:11px;letter-spacing:.24em;text-transform:uppercase;
    color:var(--violet);margin-bottom:6px;}
  #line{font-size:clamp(16px,2.5vmin,21px);line-height:1.5;color:var(--ink-100);min-height:2.9em;}
  #tapHint{margin-top:6px;font-family:var(--f-mono);font-size:10px;letter-spacing:.18em;
    text-transform:uppercase;color:#6a5f88;text-align:right;animation:pulse 2.6s ease-in-out infinite;}
  #dlg.pop #box{animation:boxPop .3s ease;}
  @keyframes boxPop{from{transform:translateY(8px);opacity:.4}}

  /* Titre du tableau */
  #sceneTitle{position:absolute;top:calc(env(safe-area-inset-top,0px) + 16px);left:0;right:0;z-index:18;
    text-align:center;pointer-events:none;}
  #sceneTitle .num{font-family:var(--f-mono);font-size:11px;letter-spacing:.4em;color:var(--gold-300);opacity:.85;}
  #sceneTitle .t{font-family:var(--f-display);font-weight:600;font-size:clamp(20px,3.6vmin,34px);
    color:var(--gold-100);text-shadow:0 2px 14px rgba(240,196,99,.3),0 1px 2px #000;margin-top:4px;}
  #sceneTitle{opacity:0;transform:translateY(-8px);transition:.7s ease;}
  #sceneTitle.show{opacity:1;transform:none;}

  /* Contrôles */
  #skip{position:absolute;top:calc(env(safe-area-inset-top,0px) + 14px);right:max(14px,env(safe-area-inset-right));
    z-index:30;font-family:var(--f-mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--ink-400);background:rgba(15,10,28,.55);border:1px solid rgba(74,58,110,.6);
    border-radius:999px;padding:9px 16px;cursor:pointer;min-height:38px;}
  #skip:hover{color:var(--gold-200);border-color:var(--gold-300);}
  #back{position:absolute;left:max(14px,env(safe-area-inset-left));top:calc(env(safe-area-inset-top,0px) + 14px);
    z-index:30;width:38px;height:38px;border-radius:50%;background:rgba(15,10,28,.55);
    border:1px solid rgba(74,58,110,.6);color:var(--ink-400);font-size:17px;cursor:pointer;}
  #back:hover{color:var(--gold-200);}
  #begin{position:absolute;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 120px);transform:translateX(-50%);
    z-index:32;display:none;font-family:var(--f-display);font-weight:600;letter-spacing:.14em;
    text-transform:uppercase;font-size:clamp(14px,2.2vmin,17px);color:#2a1a08;
    padding:15px 34px;border:none;border-radius:10px;cursor:pointer;min-height:48px;
    background:linear-gradient(180deg,#f5c970,#d4a13a 55%,#a07424);
    box-shadow:inset 0 1px 0 rgba(255,240,200,.6),0 6px 22px rgba(0,0,0,.5),0 0 0 1px #5e4318;}
  #begin.show{display:block;animation:rise .7s ease both;}
  @keyframes rise{from{opacity:0;transform:translate(-50%,16px)}to{opacity:1;transform:translateX(-50%)}}

  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div id="stage">
  <div id="camera"></div>
  <div id="shade"></div>

  <!-- Phase 1 : le coffre -->
  <div id="chestScene">
    <div id="keyRow"><img src="assets/treasures/cle.png" alt=""><span>1 clé</span></div>
    <div id="chestWrap">
      <div id="chestGlow"></div>
      <img src="assets/chests/t1_bois.png" alt="Coffre en bois">
    </div>
    <div id="chestHint">Touche le coffre pour l'ouvrir</div>
  </div>
  <div id="burst"></div>

  <!-- Titre de tableau -->
  <div id="sceneTitle"><div class="num"></div><div class="t"></div></div>

  <!-- Mémo + dialogue -->
  <div id="dlg" class="hidden">
    <div id="memoSprite"><img src="assets/mascot/idle.png" alt="Mémo"></div>
    <div id="box">
      <div id="speaker">Mémo</div>
      <div id="line"></div>
      <div id="tapHint">toucher pour continuer</div>
    </div>
  </div>

  <button id="back" class="hidden" aria-label="Précédent">‹</button>
  <button id="skip" class="hidden">Passer ▸</button>
  <button id="begin">Entrer dans l'Abîme</button>
</div>

<script src="cinematic-scenes.js"></script>
<script src="intro-memo-script.js"></script>
</body>
</html>
